<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Student Records - EduAchieve</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --primary-orange: #E8630A;
            --dark-text: #333333;
            --light-bg: #f5f5f5;
            --white: #ffffff;
            --border-color: #e0e0e0;
            --shadow: 0 2px 8px rgba(0, 0, 0, 0.1);
            --hover-shadow: 0 4px 12px rgba(0, 0, 0, 0.15);
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Roboto', sans-serif;
            background-color: var(--light-bg);
            color: var(--dark-text);
        }

        .navbar {
            background-color: var(--white);
            box-shadow: var(--shadow);
            position: sticky;
            top: 0;
            z-index: 100;
        }

        .nav-container {
            max-width: 1400px;
            margin: 0 auto;
            padding: 15px 30px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 30px;
        }

        .nav-left {
            flex: 0 0 auto;
        }

        .logo-link {
            text-decoration: none;
        }

        .logo-text {
            font-size: 24px;
            font-weight: 700;
            color: var(--primary-orange);
        }

        .nav-center {
            flex: 1;
            display: flex;
            justify-content: center;
        }

        .nav-links {
            list-style: none;
            display: flex;
            gap: 30px;
        }

        .nav-links a {
            text-decoration: none;
            color: var(--dark-text);
            font-weight: 500;
            font-size: 14px;
            transition: color 0.3s ease;
        }

        .nav-links a:hover {
            color: var(--primary-orange);
        }

        .nav-right {
            flex: 0 0 auto;
            display: flex;
            align-items: center;
            gap: 20px;
        }

        .search-container {
            display: flex;
            align-items: center;
            background-color: var(--light-bg);
            border-radius: 6px;
            border: 1px solid var(--border-color);
            overflow: hidden;
        }

        .search-input {
            padding: 10px 15px;
            border: none;
            background: none;
            font-size: 13px;
            min-width: 200px;
        }

        .search-input:focus {
            outline: none;
        }

        .search-btn {
            padding: 10px 15px;
            border: none;
            background: none;
            cursor: pointer;
            font-size: 16px;
        }

        .btn-primary {
            padding: 10px 20px;
            background-color: var(--primary-orange);
            color: var(--white);
            border: none;
            border-radius: 6px;
            font-size: 14px;
            font-weight: 600;
            cursor: pointer;
            text-decoration: none;
            transition: all 0.3s ease;
            display: inline-block;
        }

        .btn-primary:hover {
            background-color: #d45a09;
            transform: translateY(-2px);
            box-shadow: 0 4px 12px rgba(232, 99, 10, 0.3);
        }

        .dashboard-container {
            display: flex;
            max-width: 1400px;
            margin: 0 auto;
            gap: 0;
        }

        .sidebar {
            width: 280px;
            background-color: var(--white);
            padding: 30px 0;
            box-shadow: var(--shadow);
            position: sticky;
            top: 70px;
            height: calc(100vh - 70px);
            overflow-y: auto;
        }

        .sidebar-header {
            padding: 0 20px 20px;
            border-bottom: 1px solid var(--border-color);
        }

        .sidebar-header h3 {
            font-size: 14px;
            color: #999;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .sidebar-menu {
            list-style: none;
            padding: 15px 0;
        }

        .sidebar-menu li a {
            display: block;
            padding: 14px 20px;
            text-decoration: none;
            color: var(--dark-text);
            font-size: 14px;
            font-weight: 500;
            transition: all 0.3s ease;
            border-left: 3px solid transparent;
        }

        .sidebar-menu li a:hover {
            background-color: var(--light-bg);
            color: var(--primary-orange);
        }

        .sidebar-menu li a.active {
            color: var(--primary-orange);
            background-color: rgba(232, 99, 10, 0.05);
            border-left-color: var(--primary-orange);
        }

        .sidebar-support,
        .sidebar-logout {
            border-top: 1px solid var(--border-color);
            margin-top: auto;
        }

        .sidebar-logout {
            color: #d32f2f;
        }

        .sidebar-logout:hover {
            background-color: rgba(211, 47, 47, 0.05);
        }

        .main-content {
            flex: 1;
            padding: 40px;
        }

        .page-header {
            margin-bottom: 30px;
        }

        .page-header h1 {
            font-size: 32px;
            color: var(--dark-text);
            margin-bottom: 5px;
        }

        .page-header p {
            color: #999;
            font-size: 14px;
        }

        .filters-section {
            display: flex;
            gap: 20px;
            margin-bottom: 30px;
            flex-wrap: wrap;
            background-color: var(--white);
            padding: 20px;
            border-radius: 8px;
            box-shadow: var(--shadow);
        }

        .filter-group {
            display: flex;
            flex-direction: column;
            gap: 8px;
            flex: 1;
            min-width: 200px;
        }

        .filter-group label {
            font-size: 13px;
            font-weight: 600;
            color: var(--dark-text);
        }

        .filter-group select,
        .filter-group input {
            padding: 10px 12px;
            border: 1px solid var(--border-color);
            border-radius: 6px;
            font-size: 14px;
            font-family: inherit;
            transition: all 0.3s ease;
        }

        .filter-group select:focus,
        .filter-group input:focus {
            outline: none;
            border-color: var(--primary-orange);
            box-shadow: 0 0 0 3px rgba(232, 99, 10, 0.1);
        }

        .search-field {
            flex: 1.5;
        }

        .table-wrapper {
            background-color: var(--white);
            border-radius: 8px;
            box-shadow: var(--shadow);
            overflow: hidden;
            overflow-x: auto;
        }

        .records-table {
            width: 100%;
            border-collapse: collapse;
            font-size: 14px;
        }

        .records-table thead {
            background-color: var(--light-bg);
            border-bottom: 2px solid var(--border-color);
        }

        .records-table th {
            padding: 16px;
            text-align: left;
            font-weight: 600;
            color: var(--dark-text);
            text-transform: uppercase;
            font-size: 12px;
            letter-spacing: 0.5px;
        }

        .records-table td {
            padding: 16px;
            border-bottom: 1px solid var(--border-color);
            color: var(--dark-text);
        }

        .records-table tbody tr {
            transition: background-color 0.3s ease;
        }

        .records-table tbody tr:hover {
            background-color: rgba(232, 99, 10, 0.02);
        }

        .records-table tbody tr:last-child td {
            border-bottom: none;
        }

        .btn-view {
            padding: 8px 16px;
            background-color: var(--primary-orange);
            color: var(--white);
            border: none;
            border-radius: 4px;
            font-size: 12px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            text-decoration: none;
            display: inline-block;
        }

        .btn-view:hover {
            background-color: #d45a09;
            transform: translateY(-2px);
            box-shadow: 0 4px 8px rgba(232, 99, 10, 0.3);
        }

        @media (max-width: 1024px) {
            .sidebar {
                width: 250px;
            }

            .main-content {
                padding: 30px 20px;
            }

            .nav-links {
                gap: 20px;
            }

            .search-input {
                min-width: 150px;
            }
        }

        @media (max-width: 768px) {
            .dashboard-container {
                flex-direction: column;
            }

            .sidebar {
                width: 100%;
                position: static;
                height: auto;
                box-shadow: none;
                border-bottom: 1px solid var(--border-color);
                padding: 15px 0;
            }

            .sidebar-menu {
                display: flex;
                overflow-x: auto;
                padding: 10px 0;
            }

            .sidebar-menu li {
                flex: 0 0 auto;
            }

            .sidebar-menu li a {
                padding: 10px 15px;
                border-left: none;
                border-bottom: 3px solid transparent;
            }

            .sidebar-menu li a.active {
                border-left: none;
                border-bottom-color: var(--primary-orange);
            }

            .nav-container {
                flex-wrap: wrap;
                gap: 15px;
                padding: 12px 20px;
            }

            .nav-center {
                display: none;
            }

            .nav-links {
                display: none;
            }

            .search-input {
                min-width: 100%;
            }

            .filters-section {
                flex-direction: column;
                gap: 15px;
            }

            .filter-group {
                flex: 1;
                min-width: 100%;
            }

            .records-table {
                font-size: 12px;
            }

            .records-table th,
            .records-table td {
                padding: 12px 8px;
            }

            .btn-view {
                padding: 6px 12px;
                font-size: 11px;
            }
        }

        @media (max-width: 480px) {
            .nav-right {
                flex-direction: column;
                width: 100%;
            }

            .search-container {
                width: 100%;
            }

            .btn-primary {
                width: 100%;
                text-align: center;
            }

            .main-content {
                padding: 20px 15px;
            }

            .page-header h1 {
                font-size: 24px;
            }

            .filters-section {
                padding: 15px;
            }

            .records-table th {
                font-size: 11px;
                padding: 10px 6px;
            }

            .records-table td {
                padding: 10px 6px;
                font-size: 11px;
            }
        }
    </style>
</head>
<body>
    <nav class="navbar">
        <div class="nav-container">
            <div class="nav-left">
                <a href="index.html" class="logo-link">
                    <span class="logo-text">EduAchieve</span>
                </a>
            </div>
            <div class="nav-center">
                <ul class="nav-links">
                    <li><a href="index.html">Home</a></li>
                    <li><a href="explore.html">Explore</a></li>
                    <li><a href="#">About</a></li>
                </ul>
            </div>
            <div class="nav-right">
                <div class="search-container">
                    <input type="text" class="search-input" id="navSearch" placeholder="Search projects...">
                    <button class="search-btn">🔍</button>
                </div>
                <a href="login.html" class="btn-primary">Portal Access</a>
            </div>
        </div>
    </nav>

    <div class="dashboard-container">
        <aside class="sidebar">
            <div class="sidebar-header">
                <h3>Menu</h3>
            </div>
            <ul class="sidebar-menu">
                <li><a href="my-projects.html">Projects</a></li>
                <li><a href="student-records.html" class="active">Student Records</a></li>
                <li><a href="faculty-management.html">Faculty Management</a></li>
                <li><a href="settings.html">Settings</a></li>
                <li><a href="#" class="sidebar-support">📞 Support</a></li>
                <li><a href="login.html" class="sidebar-logout">Sign Out</a></li>
            </ul>
        </aside>

        <main class="main-content">
            <div class="page-header">
                <h1>Student Records</h1>
                <p>Manage and view all student information</p>
            </div>

            <div class="filters-section">
                <div class="filter-group">
                    <label for="yearFilter">Year</label>
                    <select id="yearFilter">
                        <option value="">All Years</option>
                        <option value="1st">1st Year</option>
                        <option value="2nd">2nd Year</option>
                        <option value="3rd">3rd Year</option>
                        <option value="4th">4th Year</option>
                    </select>
                </div>

                <div class="filter-group">
                    <label for="batchFilter">Batch</label>
                    <select id="batchFilter">
                        <option value="">All Batches</option>
                        <option value="A">Batch A</option>
                        <option value="B">Batch B</option>
                        <option value="C">Batch C</option>
                    </select>
                </div>

                <div class="filter-group search-field">
                    <label for="studentSearch">Search Student</label>
                    <input type="text" id="studentSearch" placeholder="Enter student name...">
                </div>
            </div>

            <div class="table-wrapper">
                <table class="records-table">
                    <thead>
                        <tr>
                            <th>Roll No</th>
                            <th>Name</th>
                            <th>Year</th>
                            <th>Batch</th>
                            <th>Projects</th>
                            <th>Action</th>
                        </tr>
                    </thead>
                    <tbody id="recordsTableBody">
                    </tbody>
                </table>
            </div>
        </main>
    </div>

    <script>
        const studentsData = [
            { rollNo: 'AI001', name: 'Aditya Kumar', year: '1st', batch: 'A', projects: 2 },
            { rollNo: 'AI002', name: 'Bhavna Singh', year: '1st', batch: 'A', projects: 1 },
            { rollNo: 'AI003', name: 'Chirag Patel', year: '2nd', batch: 'B', projects: 3 },
            { rollNo: 'AI004', name: 'Divya Sharma', year: '2nd', batch: 'B', projects: 2 },
            { rollNo: 'AI005', name: 'Eshan Verma', year: '3rd', batch: 'C', projects: 4 },
            { rollNo: 'AI006', name: 'Faria Khan', year: '3rd', batch: 'C', projects: 3 },
            { rollNo: 'AI007', name: 'Gaurav Desai', year: '4th', batch: 'A', projects: 5 },
            { rollNo: 'AI008', name: 'Hina Gupta', year: '4th', batch: 'A', projects: 4 }
        ];

        document.addEventListener('DOMContentLoaded', function() {
            const yearFilter = document.getElementById('yearFilter');
            const batchFilter = document.getElementById('batchFilter');
            const studentSearch = document.getElementById('studentSearch');
            const recordsTableBody = document.getElementById('recordsTableBody');

            populateTable(studentsData);

            yearFilter.addEventListener('change', applyFilters);
            batchFilter.addEventListener('change', applyFilters);
            studentSearch.addEventListener('input', applyFilters);

            function applyFilters() {
                const selectedYear = yearFilter.value;
                const selectedBatch = batchFilter.value;
                const searchTerm = studentSearch.value.toLowerCase();

                const filtered = studentsData.filter(student => {
                    const yearMatch = !selectedYear || student.year === selectedYear;
                    const batchMatch = !selectedBatch || student.batch === selectedBatch;
                    const nameMatch = !searchTerm || student.name.toLowerCase().includes(searchTerm);

                    return yearMatch && batchMatch && nameMatch;
                });

                populateTable(filtered);
            }

            function populateTable(data) {
                recordsTableBody.innerHTML = '';

                if (data.length === 0) {
                    recordsTableBody.innerHTML = '<tr><td colspan="6" style="text-align: center; padding: 40px; color: #999;">No students found</td></tr>';
                    return;
                }

                data.forEach(student => {
                    const row = document.createElement('tr');
                    row.innerHTML = `
                        <td>${student.rollNo}</td>
                        <td>${student.name}</td>
                        <td>${student.year}</td>
                        <td>Batch ${student.batch}</td>
                        <td><strong>${student.projects}</strong></td>
                        <td>
                            <a href="my-projects.html?student=${student.name}" class="btn-view">View Projects</a>
                        </td>
                    `;
                    recordsTableBody.appendChild(row);
                });
            }
        });
    </script>
</body>
</html>
