<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Character Counter | EduAchieve</title>
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;700&display=swap" rel="stylesheet">
  <style>
    :root {
      --primary: #E8500A;
      --bg: #F9F9F9;
      --surface: #FFFFFF;
      --text: #1A1A2E;
      --text-muted: #6B7280;
      --border: #E5E7EB;
      --success: #16A34A;
      --warning: #D97706;
      --danger: #DC2626;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: 'DM Sans', sans-serif; background: var(--bg); color: var(--text); min-height: 100vh; display: flex; flex-direction: column; }
    .topbar { background: #1A1A2E; height: 50px; display: flex; align-items: center; padding: 0 24px; }
    .topbar a { color: rgba(255,255,255,0.7); text-decoration: none; font-size: 0.85rem; }
    .topbar a:hover { color: white; }
    .topbar span { color: rgba(255,255,255,0.3); margin: 0 10px; }
    .topbar b { color: white; font-size: 0.85rem; }

    .main { flex: 1; display: flex; align-items: center; justify-content: center; padding: 40px 20px; }
    .card { background: var(--surface); border-radius: 16px; box-shadow: 0 8px 32px rgba(0,0,0,0.08); padding: 40px; width: 100%; max-width: 700px; }
    .card-header { text-align: center; margin-bottom: 32px; }
    .card-header span { background: rgba(232,80,10,0.1); color: var(--primary); padding: 4px 12px; border-radius: 20px; font-size: 0.75rem; font-weight: 600; display: inline-block; margin-bottom: 12px; }
    .card-header h1 { font-size: 1.8rem; font-weight: 700; margin-bottom: 8px; }
    .card-header p { color: var(--text-muted); font-size: 0.95rem; }

    .textarea-wrap { position: relative; margin-bottom: 12px; }
    textarea {
      width: 100%; padding: 16px; border-radius: 10px;
      border: 2px solid var(--border); font-family: inherit;
      font-size: 1rem; resize: vertical; min-height: 180px;
      line-height: 1.7; transition: border-color 0.2s;
    }
    textarea:focus { outline: none; border-color: var(--primary); }
    textarea.warn { border-color: var(--warning); }
    textarea.danger { border-color: var(--danger); }

    .stats-row { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; margin-bottom: 20px; }
    .stat-box { background: var(--bg); border: 1px solid var(--border); border-radius: 10px; padding: 16px; text-align: center; }
    .stat-box .num { font-size: 2.5rem; font-weight: 800; margin-bottom: 4px; transition: color 0.3s; }
    .stat-box .lbl { font-size: 0.75rem; color: var(--text-muted); text-transform: uppercase; letter-spacing: 0.05em; font-weight: 600; }

    .color-ok { color: var(--success); }
    .color-warn { color: var(--warning); }
    .color-danger { color: var(--danger); }
    .color-default { color: var(--primary); }

    .progress-section { margin-bottom: 24px; }
    .progress-label { display: flex; justify-content: space-between; font-size: 0.82rem; font-weight: 600; margin-bottom: 6px; color: var(--text-muted); }
    .progress-bar { width: 100%; height: 10px; background: var(--bg); border-radius: 5px; overflow: hidden; border: 1px solid var(--border); }
    .progress-fill { height: 100%; border-radius: 5px; transition: width 0.2s, background-color 0.3s; background: var(--success); }

    .btn-submit { width: 100%; padding: 14px; background: var(--primary); color: white; border: none; border-radius: 10px; font-size: 1.05rem; font-weight: 700; cursor: pointer; transition: background 0.2s, opacity 0.2s; font-family: inherit; }
    .btn-submit:disabled { opacity: 0.4; cursor: not-allowed; }
    .btn-submit:not(:disabled):hover { background: #C94008; }

    .hint-msg { font-size: 0.82rem; color: var(--text-muted); text-align: center; margin-top: 12px; }
    .hint-msg.show-ok { color: var(--success); font-weight: 600; }
  </style>
</head>
<body>

  <div class="topbar">
    <a href="index.html">EduAchieve</a>
    <span>›</span>
    <div style="font-size: 0.8rem; font-weight: 700; text-transform: uppercase; letter-spacing: 0.05em; color: var(--primary); margin-bottom: 8px;">Character Counter</div>
  </div>

  <div class="main">
    <div class="card">
      <div class="card-header">
        <span>Interactive Component</span>
        <h1>Project Abstract Writer</h1>
        <p>Write your project abstract below. Minimum 100 characters required to submit.</p>
      </div>

      <div class="textarea-wrap">
        <textarea id="abstractText" placeholder="Write your project abstract here... Describe the problem you solved, your methodology, tools used, and the key outcomes or results of your research project."></textarea>
      </div>

      <div class="stats-row">
        <div class="stat-box">
          <div class="num color-default" id="charNum">0</div>
          <div class="lbl">Characters / 500</div>
        </div>
        <div class="stat-box">
          <div class="num color-default" id="wordNum">0</div>
          <div class="lbl">Words</div>
        </div>
      </div>

      <div class="progress-section">
        <div class="progress-label">
          <span>Progress to 500 chars</span>
          <span id="pctLabel">0%</span>
        </div>
        <div class="progress-bar">
          <div class="progress-fill" id="progressFill" style="width: 0%;"></div>
        </div>
      </div>

      <button class="btn-submit" id="submitBtn" disabled>Submit Abstract</button>
      <p class="hint-msg" id="hintMsg">Type at least 100 characters to enable submission.</p>
    </div>
  </div>

  <script>
    const textarea = document.getElementById('abstractText');
    const charNum = document.getElementById('charNum');
    const wordNum = document.getElementById('wordNum');
    const progressFill = document.getElementById('progressFill');
    const pctLabel = document.getElementById('pctLabel');
    const submitBtn = document.getElementById('submitBtn');
    const hintMsg = document.getElementById('hintMsg');
    const MAX = 500;

    textarea.addEventListener('input', () => {
      const text = textarea.value;
      const len = Math.min(text.length, MAX);
      const words = text.trim() === '' ? 0 : text.trim().split(/\s+/).length;
      const pct = Math.round((len / MAX) * 100);

      charNum.textContent = len;
      wordNum.textContent = words;
      pctLabel.textContent = pct + '%';

      const fillWidth = Math.min(pct, 100) + '%';
      progressFill.style.width = fillWidth;

      // Color states
      let colorClass = 'color-ok';
      let fillColor = 'var(--success)';
      let borderClass = '';

      if (pct >= 95) {
        colorClass = 'color-danger';
        fillColor = 'var(--danger)';
        borderClass = 'danger';
      } else if (pct >= 80) {
        colorClass = 'color-warn';
        fillColor = 'var(--warning)';
        borderClass = 'warn';
      } else if (pct < 20) {
        colorClass = 'color-default';
        fillColor = 'var(--primary)';
      }

      charNum.className = 'num ' + colorClass;
      wordNum.className = 'num ' + colorClass;
      progressFill.style.backgroundColor = fillColor;
      textarea.className = borderClass;

      // Limit to max
      if (text.length > MAX) {
        textarea.value = text.substring(0, MAX);
      }

      // Enable button at >= 100 chars
      const enabled = len >= 100;
      submitBtn.disabled = !enabled;

      if (enabled) {
        hintMsg.textContent = '✓ Abstract ready to submit!';
        hintMsg.className = 'hint-msg show-ok';
      } else {
        const remaining = 100 - len;
        hintMsg.textContent = `Type ${remaining} more character${remaining !== 1 ? 's' : ''} to enable submission.`;
        hintMsg.className = 'hint-msg';
      }
    });

    submitBtn.addEventListener('click', () => {
      alert('Abstract submitted successfully! In a real submission form, this would be sent to the server.');
    });
  </script>
</body>
</html>
