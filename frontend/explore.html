<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Explore Projects | EduAchieve</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>

  <!-- Navbar -->
  <header class="site-topbar">
    <div class="brand-mark">🎓</div>
    <div>
      <div class="brand-title">EduAchieve</div>
      <div class="brand-sub">CSE AI&ML | PCCOE</div>
    </div>
    
    <nav class="top-nav">
      <a href="index.html">Home</a>
      <a href="explore.html" class="active">Projects</a>
      <a href="submit.html">Submit</a>
      <a href="about.html">About</a>
    </nav>
    
    <div class="search-wrap">
      <input type="text" class="search-input-global" id="globalSearch" placeholder="Search projects...">
    </div>
    
    <div class="nav-actions">
      <a href="login.html" class="btn-primary" id="navLogin">Login</a>
      <span class="nav-username" id="navUser"></span>
      <button id="navLogout" style="display: none; background: none; border: none; color: #DC2626; cursor: pointer; font-size: 0.82rem; font-weight: 600;" onclick="logout()">Logout</button>
    </div>
  </header>

  <div class="container">
    <div class="explore-layout">
      <!-- Sidebar -->
      <aside class="sidebar-filter">
        <h2 style="font-size: 1.1rem; margin-bottom: 20px;">Filters</h2>
        
        <div class="filter-section">
          <div class="filter-title">Batch</div>
          <div id="batchFilters">
            <button class="batch-chip active" data-val="">All</button>
            <button class="batch-chip" data-val="2020-21">2020-21</button>
            <button class="batch-chip" data-val="2021-22">2021-22</button>
            <button class="batch-chip" data-val="2022-23">2022-23</button>
            <button class="batch-chip" data-val="2023-24">2023-24</button>
            <button class="batch-chip" data-val="2024-25">2024-25</button>
          </div>
        </div>

        <div class="filter-section">
          <div class="filter-title">Year</div>
          <div id="yearFilters">
            <button class="batch-chip active" data-val="">All</button>
            <button class="batch-chip" data-val="1st Year">1st Year</button>
            <button class="batch-chip" data-val="2nd Year">2nd Year</button>
            <button class="batch-chip" data-val="3rd Year">3rd Year</button>
            <button class="batch-chip" data-val="4th Year">4th Year</button>
          </div>
        </div>

        <div class="filter-section">
          <div class="filter-title">Domain</div>
          <div id="domainFilters">
            <label class="domain-check-item"><input type="checkbox" value="AI/ML"> AI/ML</label>
            <label class="domain-check-item"><input type="checkbox" value="Web Development"> Web Development</label>
            <label class="domain-check-item"><input type="checkbox" value="IoT"> IoT</label>
            <label class="domain-check-item"><input type="checkbox" value="Data Science"> Data Science</label>
            <label class="domain-check-item"><input type="checkbox" value="Other"> Other</label>
          </div>
        </div>
      </aside>

      <!-- Main Content -->
      <main>
        <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 24px;">
          <h1 style="font-size: 1.35rem;">Project Gallery</h1>
          <span id="resultCount" style="color: #6B7280; font-size: 0.85rem;">0 projects found</span>
        </div>

        <div id="projectsGrid" style="display: grid; grid-template-columns: repeat(auto-fill, minmax(300px, 1fr)); gap: 20px;">
          <!-- Content loaded via JS -->
        </div>

        <div id="pagination" style="display: flex; justify-content: center; gap: 8px; margin-top: 40px;">
          <!-- Pagination -->
        </div>
      </main>
    </div>
  </div>

  <footer class="site-footer">
    <div class="footer-grid">
      <div style="text-align: left;">
        <p style="font-weight: 700; color: #fff; margin-bottom: 10px;">EduAchieve Gallery</p>
        <p>Institutional Research Repository</p>
      </div>
      <div class="footer-links">
        <a href="index.html">Home</a>
        <a href="explore.html">Projects</a>
        <a href="about.html">About</a>
      </div>
      <div style="text-align: right;">
        <p>© 2024-26 PCCOE Pune</p>
      </div>
    </div>
  </footer>

  <script src="common.js"></script>
  <script>
    let currentFilters = { batch: '', year: '', domains: [], page: 1, limit: 9, q: '' };

    document.addEventListener('DOMContentLoaded', () => {
      // Setup filtering logic
      document.querySelectorAll('.batch-chip').forEach(chip => {
        chip.addEventListener('click', (e) => {
          const parent = e.target.parentElement.id;
          document.querySelectorAll('#' + parent + ' .batch-chip').forEach(c => c.classList.remove('active'));
          e.target.classList.add('active');
          if (parent === 'batchFilters') currentFilters.batch = e.target.dataset.val;
          if (parent === 'yearFilters') currentFilters.year = e.target.dataset.val;
          loadProjects();
        });
      });

      document.querySelectorAll('#domainFilters input').forEach(chk => {
        chk.addEventListener('change', () => {
          currentFilters.domains = Array.from(document.querySelectorAll('#domainFilters input:checked')).map(el => el.value);
          loadProjects();
        });
      });

      document.getElementById('globalSearch').addEventListener('input', (e) => {
        currentFilters.q = e.target.value.trim();
        loadProjects();
      });

      loadProjects();
    });

    async function loadProjects() {
      const grid = document.getElementById('projectsGrid');
      grid.innerHTML = '<div style="grid-column: 1 / -1; text-align: center; padding: 40px;">Loading gallery...</div>';
      
      try {
        let qs = `?page=${currentFilters.page}&limit=${currentFilters.limit}`;
        if (currentFilters.batch) qs += `&batch=${encodeURIComponent(currentFilters.batch)}`;
        if (currentFilters.year) qs += `&year=${encodeURIComponent(currentFilters.year)}`;
        if (currentFilters.domains.length) qs += `&domain=${encodeURIComponent(currentFilters.domains.join(','))}`;
        
        const endpoint = currentFilters.q ? `/api/projects/search?q=${encodeURIComponent(currentFilters.q)}&${qs.substring(1)}` : '/api/projects' + qs;
        const data = await apiCall(endpoint);
        renderProjects(data);
      } catch (err) {
        grid.innerHTML = '<div style="grid-column: 1 / -1; text-align: center; color: red;">Error loading projects.</div>';
      }
    }

    function renderProjects(data) {
      const grid = document.getElementById('projectsGrid');
      const countEl = document.getElementById('resultCount');
      countEl.textContent = `${data.total || 0} projects found`;

      if (!data.projects || data.projects.length === 0) {
        grid.innerHTML = `
          <div style="grid-column: 1 / -1; padding: 60px 20px; text-align: center; background: #fff; border: 1px solid #E5E7EB; border-radius: 10px;">
            <div style="font-size: 3rem; margin-bottom: 16px;">🔍</div>
            <h3 style="margin-bottom: 8px;">No projects found</h3>
            <p style="color: #6B7280;">Try adjusting your filters or search query.</p>
          </div>
        `;
        return;
      }

      grid.innerHTML = data.projects.map(p => `
        <div class="project-card" onclick="window.location.href='project-detail.html?id=${p.id}'">
          <div style="display: flex; gap: 8px; margin-bottom: 12px; flex-wrap: wrap;">
            <span class="domain-tag">${escapeHtml(p.domain)}</span>
            <span class="batch-tag">${escapeHtml(p.batch)}</span>
          </div>
          <h3 style="font-size: 1.1rem; margin-bottom: 8px;">${escapeHtml(p.title)}</h3>
          <p style="font-size: 0.85rem; color: #6B7280; margin-bottom: 16px;">By ${escapeHtml(p.submittedByName)} • ${escapeHtml(p.year)}</p>
          <div style="margin-top: auto; padding-top: 16px; border-top: 1px solid #F3F4F6; display: flex; justify-content: space-between; align-items: center;">
            <span style="font-size: 0.75rem; color: #9CA3AF;">${formatDate(p.createdAt)}</span>
            <span style="color: var(--primary); font-weight: 600; font-size: 0.82rem;">View Details →</span>
          </div>
        </div>
      `).join('');
    }
  </script>
</body>
</html>
