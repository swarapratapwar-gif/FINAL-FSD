<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Explore Projects | EduAchieve</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Outfit:wght@500;600;700;800;900&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="styles.css">
  <style>
    body { 
      background: var(--bg); 
      color: var(--text); 
      font-family: 'Inter', sans-serif; 
      margin: 0; 
    }

    /* Topbar */
    .site-topbar { 
      background: var(--navy); 
      height: 64px; 
      display: flex; 
      align-items: center; 
      padding: 0 40px; 
      border-bottom: 1px solid rgba(255,255,255,0.05);
    }
    .top-nav a { color: rgba(255,255,255,0.7); font-size: 0.9rem; text-decoration: none; transition: color 0.2s; }
    .top-nav a:hover, .top-nav a.active { color: #FFFFFF; }
    
    /* Global Search in Topbar */
    .top-search-box {
      display: flex;
      align-items: center;
      background: rgba(255,255,255,0.1);
      border: 1px solid rgba(255,255,255,0.15);
      border-radius: 100px;
      padding: 6px 14px;
      margin-left: 24px;
    }
    .top-search-box input {
      background: transparent;
      border: none;
      color: #FFF;
      outline: none;
      font-size: 0.85rem;
      width: 180px;
    }
    .top-search-box input::placeholder { color: rgba(255,255,255,0.5); }
    .top-search-box .icon { color: rgba(255,255,255,0.5); margin-right: 8px; }

    .gallery-container { max-width: 1200px; margin: 40px auto; padding: 0 20px; }

    /* Page Header */
    .gallery-header {
      display: flex;
      justify-content: space-between;
      align-items: flex-end;
      margin-bottom: 24px;
      padding-bottom: 12px;
    }
    .gallery-title { 
      font-family: 'Outfit', sans-serif; 
      font-size: 2.2rem; 
      font-weight: 800; 
      margin: 0; 
      letter-spacing: -0.02em;
      position: relative;
      display: inline-block;
    }
    .gallery-title::after {
      content: '';
      position: absolute;
      bottom: -12px;
      left: 0;
      width: 60px;
      height: 3px;
      background: var(--primary);
      border-radius: 2px;
    }
    .result-count { color: var(--text-muted); font-size: 0.9rem; font-weight: 500; }

    /* Search & Sort Row */
    .search-sort-row {
      display: flex;
      justify-content: flex-end;
      gap: 16px;
      margin-bottom: 32px;
    }
    
    .sort-box select {
      padding: 10px 16px;
      border: 1px solid var(--border);
      border-radius: 8px;
      background: var(--bg-surface);
      font-family: 'Inter', sans-serif;
      font-size: 0.9rem;
      color: var(--text);
      outline: none;
      cursor: pointer;
    }

    /* Layout */
    .explore-layout {
      display: grid;
      grid-template-columns: 260px 1fr;
      gap: 40px;
      align-items: start;
    }

    @media (max-width: 900px) {
      .explore-layout { grid-template-columns: 1fr; }
      .sidebar-filter { display: none; /* simple responsive fix */ }
    }

    /* Sidebar Filters */
    .sidebar-filter {
      background: transparent;
      padding: 0 20px 0 0;
      position: sticky;
      top: 24px;
    }
    .sidebar-filter h2 {
      font-family: 'Outfit', sans-serif;
      font-size: 1.1rem;
      margin: 0 0 20px 0;
      color: var(--text-dark);
    }
    .filter-section { margin-bottom: 24px; }
    .filter-title { font-size: 0.8rem; font-weight: 600; text-transform: uppercase; color: var(--text-muted); margin-bottom: 12px; letter-spacing: 0.05em; }
    
    .batch-chip {
      display: inline-block;
      padding: 6px 12px;
      border: 1px solid var(--border);
      background: var(--bg-surface);
      color: var(--text-muted);
      border-radius: 6px;
      font-size: 0.85rem;
      margin: 0 6px 8px 0;
      cursor: pointer;
      transition: all 0.2s;
    }
    .batch-chip:hover { border-color: var(--text-muted); }
    .batch-chip.active {
      background: rgba(232, 80, 10, 0.1);
      color: var(--primary);
      border-color: rgba(232, 80, 10, 0.3);
      font-weight: 600;
    }

    .domain-check-item {
      display: flex;
      align-items: center;
      gap: 8px;
      font-size: 0.9rem;
      color: var(--text);
      margin-bottom: 10px;
      cursor: pointer;
    }

    /* Project Grid */
    .projects-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
      gap: 24px;
    }

    /* Project Card */
    .project-card {
      background: var(--bg-surface);
      border: 1px solid var(--border);
      border-radius: 16px;
      padding: 24px;
      transition: all 0.2s ease;
      cursor: pointer;
      box-shadow: 0 2px 8px rgba(0,0,0,0.02);
      display: flex;
      flex-direction: column;
      height: 100%;
    }
    
    .project-card:hover {
      transform: translateY(-4px);
      border-color: var(--primary);
      box-shadow: 0 12px 24px rgba(0,0,0,0.06);
    }
    
    .year-badge {
      background: var(--border);
      color: var(--text);
      font-size: 0.75rem;
      font-weight: 600;
      padding: 4px 10px;
      border-radius: 6px;
      display: inline-block;
    }
    
    .domain-tag {
      background: rgba(232, 80, 10, 0.1);
      color: var(--primary);
      font-size: 0.75rem;
      font-weight: 600;
      padding: 4px 10px;
      border-radius: 6px;
      display: inline-block;
    }
    
    .project-card h3 {
      font-family: 'Outfit', sans-serif;
      font-size: 1.15rem;
      font-weight: 700;
      margin: 0 0 8px 0;
      color: var(--text);
      line-height: 1.4;
      display: -webkit-box;
      -webkit-line-clamp: 2;
      -webkit-box-orient: vertical;
      overflow: hidden;
    }
    
    .author-info {
      color: var(--text-muted);
      font-size: 0.85rem;
      margin: 0 0 24px 0;
      flex-grow: 1;
    }
    
    .card-footer {
      display: flex;
      justify-content: space-between;
      align-items: center;
      border-top: 1px solid var(--border);
      padding-top: 16px;
    }
    
    .card-date { font-size: 0.75rem; color: #9CA3AF; }
    
    .view-link {
      color: var(--primary);
      font-size: 0.85rem;
      font-weight: 600;
      display: flex;
      align-items: center;
      gap: 4px;
      transition: opacity 0.2s;
    }
    
    .project-card:hover .view-link {
      opacity: 0.8;
    }

    /* Pagination */
    .pagination {
      display: flex;
      justify-content: center;
      gap: 8px;
      margin-top: 40px;
    }
    
    .pagination button {
      background: var(--bg-surface);
      border: 1px solid var(--border);
      padding: 8px 16px;
      border-radius: 6px;
      cursor: pointer;
      font-family: 'Inter', sans-serif;
      font-size: 0.9rem;
      transition: all 0.2s;
    }
    
    .pagination button:hover:not(:disabled) {
      border-color: var(--primary);
      color: var(--primary);
    }
    
    .pagination button.active {
      background: var(--primary);
      color: var(--text-on-dark);
      border-color: var(--primary);
    }
    
    .pagination button:disabled {
      opacity: 0.5;
      cursor: not-allowed;
    }

  </style>
</head>
<body>

  <!-- Top Navigation -->
  <header class="site-topbar" style="background: var(--bg-darker); border-bottom: 1px solid var(--border); height: 64px; display: flex; align-items: center; padding: 0 40px; justify-content: space-between;">
  <div style="display: flex; align-items: center; gap: 12px; width: 300px;">
    <div class="brand-mark" style="background: #E8500A; width: 28px; height: 28px; display: flex; align-items: center; justify-content: center; border-radius: 6px; color: white; font-size: 0.8rem;">🎓</div>
    <div class="brand-title" style="color: white; font-weight: 800; font-size: 1.2rem; font-family: 'Outfit', sans-serif;">EduAchieve</div>
  </div>
  <nav class="top-nav" style="display: flex; gap: 32px; justify-content: center; flex: 1;">
    <a href="index.html" style="color: rgba(255,255,255,0.7); text-decoration: none; font-size: 0.95rem; font-family: 'Inter', sans-serif; font-weight: 500; transition: color 0.2s;" onmouseover="this.style.color='#FFF'" onmouseout="this.style.color='rgba(255,255,255,0.7)'">Home</a>
    <a href="explore.html" style="color: rgba(255,255,255,0.7); text-decoration: none; font-size: 0.95rem; font-family: 'Inter', sans-serif; font-weight: 500; transition: color 0.2s;" onmouseover="this.style.color='#FFF'" onmouseout="this.style.color='rgba(255,255,255,0.7)'">Projects</a>
    <a href="submit.html" style="color: rgba(255,255,255,0.7); text-decoration: none; font-size: 0.95rem; font-family: 'Inter', sans-serif; font-weight: 500; transition: color 0.2s;" onmouseover="this.style.color='#FFF'" onmouseout="this.style.color='rgba(255,255,255,0.7)'">Submit</a>
    <a href="about.html" style="color: rgba(255,255,255,0.7); text-decoration: none; font-size: 0.95rem; font-family: 'Inter', sans-serif; font-weight: 500; transition: color 0.2s;" onmouseover="this.style.color='#FFF'" onmouseout="this.style.color='rgba(255,255,255,0.7)'">About</a>
  </nav>
  <div class="nav-actions" style="display: flex; align-items: center; gap: 16px; width: 300px; justify-content: flex-end;">
    <a href="login.html" class="btn-primary" id="navLogin" style="background: #E8500A; color: white; padding: 8px 20px; border-radius: 6px; text-decoration: none; font-size: 0.85rem; font-weight: 600; font-family: 'Inter', sans-serif;">Login</a>
    <span class="nav-username" id="navUser" style="color: white; font-size: 0.85rem; font-family: 'Inter', sans-serif;"></span>
    <button id="navLogout" style="display: none; background: none; border: none; color: #F87171; cursor: pointer; font-size: 0.85rem; font-weight: 600; font-family: 'Inter', sans-serif;" onclick="logout()">Logout</button>
  </div>
</header>

  <div class="gallery-container">
    
    <!-- Page Header -->
    <div class="gallery-header">
      <h1 class="gallery-title">Project Gallery</h1>
      <span class="result-count" id="resultCount">0 projects found</span>
    </div>

    <!-- Search & Sort Row -->
    <div class="search-sort-row">
      <div style="display: flex; align-items: center; background: var(--bg-surface); border: 1px solid var(--border); border-radius: 8px; padding: 6px 14px; width: 280px;">
        <i data-lucide="search" class="icon" style="width: 16px; height: 16px; color: var(--text-muted); margin-right: 8px;"></i>
        <input type="text" id="globalSearch" placeholder="Search projects..." style="border: none; outline: none; background: transparent; color: var(--text); font-size: 0.9rem; font-family: 'Inter', sans-serif; width: 100%;">
      </div>
      <div class="sort-box">
        <select id="sortSelect">
          <option value="latest">Sort by: Latest</option>
          <option value="oldest">Sort by: Oldest</option>
        </select>
      </div>
    </div>

    <!-- Main Layout -->
    <div class="explore-layout">
      
      <!-- Left Sidebar (Filters) -->
      <aside class="sidebar-filter">
        <h2>Filters</h2>
        
        <div class="filter-section">
          <div class="filter-title">Batch</div>
          <div id="batchFilters">
            <button class="batch-chip active" data-val="">All</button>
            <button class="batch-chip" data-val="2020-21">2020-21</button>
            <button class="batch-chip" data-val="2021-22">2021-22</button>
            <button class="batch-chip" data-val="2022-23">2022-23</button>
            <button class="batch-chip" data-val="2023-24">2023-24</button>
            <button class="batch-chip" data-val="2024-25">2024-25</button>
            <button class="batch-chip" data-val="2025-26">2025-26</button>
          </div>
        </div>

        <div class="filter-section">
          <div class="filter-title">Year</div>
          <div id="yearFilters">
            <button class="batch-chip active" data-val="">All</button>
            <button class="batch-chip" data-val="1st Year">1st Year</button>
            <button class="batch-chip" data-val="2nd Year">2nd Year</button>
            <button class="batch-chip" data-val="3rd Year">3rd Year</button>
            <button class="batch-chip" data-val="4th Year">4th Year</button>
          </div>
        </div>

        <div class="filter-section">
          <div class="filter-title">Domain</div>
          <div id="domainFilters">
            <label class="domain-check-item"><input type="checkbox" value="AI/ML"> AI/ML</label>
            <label class="domain-check-item"><input type="checkbox" value="Web Development"> Web Development</label>
            <label class="domain-check-item"><input type="checkbox" value="IoT"> IoT</label>
            <label class="domain-check-item"><input type="checkbox" value="Data Science"> Data Science</label>
            <label class="domain-check-item"><input type="checkbox" value="Other"> Other</label>
          </div>
        </div>
      </aside>

      <!-- Project Grid -->
      <main>
        <div id="projectsGrid" class="projects-grid">
          <!-- Content loaded via JS -->
        </div>

        <div id="pagination" class="pagination">
          <!-- Pagination -->
        </div>
      </main>

    </div>
  </div>

  <footer class="site-footer" style="background: var(--navy); border-top: 1px solid rgba(255,255,255,0.05); padding: 50px 0; color: rgba(255,255,255,0.6); margin-top: 60px;">
    <div style="max-width: 1200px; margin: 0 auto; padding: 0 20px; display: flex; justify-content: space-between; align-items: center;">
      <p style="color: white; font-weight: 800; font-family: 'Outfit', sans-serif; font-size: 1.2rem; margin: 0;">EduAchieve <span style="font-size: 0.85rem; font-family: 'Inter', sans-serif; font-weight: 400; color: rgba(255,255,255,0.6); margin-left: 8px;">Academic Repository</span></p>
      <p style="margin: 0; font-size: 0.85rem;">© 2024-26 PCCOE Pune</p>
    </div>
  </footer>

  <script src="common.js"></script>
  <script src="https://unpkg.com/lucide@latest"></script>
  <script>
    lucide.createIcons();

    let currentFilters = { batch: '', year: '', domains: [], page: 1, limit: 100, q: '', sort: 'latest' };

    document.addEventListener('DOMContentLoaded', () => {
      // Setup filtering logic
      document.querySelectorAll('.batch-chip').forEach(chip => {
        chip.addEventListener('click', (e) => {
          const parent = e.target.parentElement.id;
          document.querySelectorAll('#' + parent + ' .batch-chip').forEach(c => c.classList.remove('active'));
          e.target.classList.add('active');
          if (parent === 'batchFilters') currentFilters.batch = e.target.dataset.val;
          if (parent === 'yearFilters') currentFilters.year = e.target.dataset.val;
          currentFilters.page = 1;
          loadProjects();
        });
      });

      document.querySelectorAll('#domainFilters input').forEach(chk => {
        chk.addEventListener('change', () => {
          currentFilters.domains = Array.from(document.querySelectorAll('#domainFilters input:checked')).map(el => el.value);
          currentFilters.page = 1;
          loadProjects();
        });
      });

      // Global Search
      let searchTimeout;
      document.getElementById('globalSearch').addEventListener('input', (e) => {
        clearTimeout(searchTimeout);
        searchTimeout = setTimeout(() => {
          currentFilters.q = e.target.value.trim();
          currentFilters.page = 1;
          loadProjects();
        }, 300);
      });

      // Sort
      document.getElementById('sortSelect').addEventListener('change', (e) => {
        currentFilters.sort = e.target.value;
        currentFilters.page = 1;
        loadProjects();
      });

      loadProjects();
    });

    async function loadProjects() {
      const grid = document.getElementById('projectsGrid');
      grid.innerHTML = '<div style="grid-column: 1 / -1; text-align: center; padding: 60px; color: #6B7280;">Loading gallery...</div>';
      
      try {
        let qs = `?page=${currentFilters.page}&limit=${currentFilters.limit}&sort=${currentFilters.sort}`;
        if (currentFilters.batch) qs += `&batch=${encodeURIComponent(currentFilters.batch)}`;
        if (currentFilters.year) qs += `&year=${encodeURIComponent(currentFilters.year)}`;
        if (currentFilters.domains.length) qs += `&domain=${encodeURIComponent(currentFilters.domains.join(','))}`;
        
        const endpoint = currentFilters.q ? `/api/projects/search?q=${encodeURIComponent(currentFilters.q)}&${qs.substring(1)}` : '/api/projects' + qs;
        const data = await apiCall(endpoint);
        renderProjects(data);
        renderPagination(data.total, data.page, data.limit);
      } catch (err) {
        grid.innerHTML = '<div style="grid-column: 1 / -1; text-align: center; color: #DC2626; padding: 40px;">Error loading projects.</div>';
      }
    }

    function renderProjects(data) {
      const grid = document.getElementById('projectsGrid');
      const countEl = document.getElementById('resultCount');
      countEl.textContent = `${data.total || 0} projects found`;

      if (!data.projects || data.projects.length === 0) {
        grid.innerHTML = `
          <div style="grid-column: 1 / -1; padding: 80px 20px; text-align: center; background: var(--bg-surface); border: 1px dashed var(--border); border-radius: 16px;">
            <i data-lucide="search-x" style="width: 48px; height: 48px; color: var(--text-muted); margin-bottom: 16px;"></i>
            <h3 style="margin: 0 0 8px 0; font-family: 'Outfit', sans-serif; color: var(--text);">No projects found</h3>
            <p style="color: var(--text-muted); margin: 0;">Try adjusting your filters or search query.</p>
          </div>
        `;
        lucide.createIcons();
        return;
      }

      grid.innerHTML = data.projects.map(p => `
        <div class="project-card" onclick="window.location.href='project-detail.html?id=${p.id}'">
          <div style="display: flex; gap: 8px; margin-bottom: 16px; flex-wrap: wrap;">
            ${p.domain ? `<span class="domain-tag">${escapeHtml(p.domain)}</span>` : ''}
            <span class="year-badge">${escapeHtml(p.batch || p.year)}</span>
          </div>
          <h3>${escapeHtml(p.title)}</h3>
          
          <div class="card-footer">
            <span class="card-date">${formatDate(p.createdAt)}</span>
            <span class="view-link">View Details <i data-lucide="arrow-right" style="width: 14px; height: 14px;"></i></span>
          </div>
        </div>
      `).join('');
      
      lucide.createIcons();
    }

    function renderPagination(total, page, limit) {
      const container = document.getElementById('pagination');
      if (!total || total <= limit) {
        container.innerHTML = '';
        return;
      }

      const totalPages = Math.ceil(total / limit);
      let html = `<button ${page === 1 ? 'disabled' : ''} onclick="goToPage(${page - 1})">Previous</button>`;
      
      for (let i = 1; i <= totalPages; i++) {
        html += `<button class="${i === page ? 'active' : ''}" onclick="goToPage(${i})">${i}</button>`;
      }
      
      html += `<button ${page === totalPages ? 'disabled' : ''} onclick="goToPage(${page + 1})">Next</button>`;
      container.innerHTML = html;
    }

    function goToPage(p) {
      currentFilters.page = p;
      loadProjects();
      window.scrollTo({ top: 0, behavior: 'smooth' });
    }
  </script>
</body>
</html>
