<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Project Detail — EduAchieve</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <nav class="navbar">
    <a class="nav-brand" href="index.html">
      <div class="nav-logo">E</div>
      <span class="nav-brand-text">Edu<span>Achieve</span></span>
    </a>
    <div class="nav-links">
      <a href="index.html">← Back</a>
      <span id="userName" class="user-name hidden"></span>
      <button id="logoutBtn" class="btn-logout hidden"
        onclick="logout()">Logout</button>
    </div>
  </nav>

  <div class="container">
    <div id="projectDetail" class="detail-container">
      <div class="spinner-container">
        <div class="spinner"></div>
        <p class="spinner-text">Loading project...</p>
      </div>
    </div>
  </div>

  <footer class="footer">
    <div class="footer-bottom" style="max-width:1200px;
      margin:0 auto;padding:20px 40px;">
      <span>© 2026 EduAchieve. All rights reserved.</span>
      <span>Made with ❤️ by Samruddhi Dhumal</span>
    </div>
  </footer>

  <style>
    .detail-links {
      display: flex;
      gap: 14px;
      margin-bottom: 28px;
      flex-wrap: wrap;
    }

    .detail-link-btn {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      padding: 11px 22px;
      border-radius: 10px;
      font-size: 0.93rem;
      font-weight: 600;
      text-decoration: none;
      transition: all 0.3s ease;
      border: none;
      cursor: pointer;
    }

    .detail-github {
      background: #1a1a2e;
      color: white;
    }

    .detail-github:hover {
      background: #333;
      transform: translateY(-2px);
      box-shadow: 0 6px 20px rgba(0,0,0,0.2);
    }

    .detail-linkedin {
      background: #0077b5;
      color: white;
    }

    .detail-linkedin:hover {
      background: #005885;
      transform: translateY(-2px);
      box-shadow: 0 6px 20px rgba(0,119,181,0.3);
    }

    .detail-batch-badge {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      background: linear-gradient(135deg,
        rgba(108,99,255,0.12), rgba(255,101,132,0.12));
      border: 1px solid rgba(108,99,255,0.2);
      color: var(--primary);
      padding: 5px 14px;
      border-radius: 20px;
      font-size: 0.85rem;
      font-weight: 600;
      margin-bottom: 16px;
      width: fit-content;
    }
  </style>

  <script>
    var token = localStorage.getItem('token');
    var user  = JSON.parse(localStorage.getItem('user'));

    if (user) {
      document.getElementById('userName').textContent =
        '👤 ' + user.name;
      document.getElementById('userName').classList.remove('hidden');
      document.getElementById('logoutBtn').classList.remove('hidden');
    }

    function logout() {
      localStorage.removeItem('token');
      localStorage.removeItem('user');
      window.location.href = 'login.html';
    }

    var urlParams = new URLSearchParams(window.location.search);
    var projectId = urlParams.get('id');

    function loadProject() {
      if (!projectId) {
        document.getElementById('projectDetail').innerHTML =
          '<p class="error-msg">No project ID found.</p>';
        return;
      }

      fetch('http://localhost:5000/api/projects/' + projectId)
        .then(function(res) { return res.json(); })
        .then(function(project) {
          renderProject(project);
        })
        .catch(function() {
          document.getElementById('projectDetail').innerHTML =
            '<div class="no-results">' +
            '<div class="no-results-icon">⚠️</div>' +
            '<h3>Could not load project</h3>' +
            '</div>';
        });
    }

    function renderProject(project) {
      var isOwner = user && user.id === project.owner;

      // Tech tags
      var techTags = '';
      if (project.techStack) {
        project.techStack.split(',').forEach(function(t) {
          techTags +=
            '<span class="tech-tag">' + t.trim() + '</span>';
        });
      }

      // GitHub button
      var githubBtn = '';
      if (project.github && project.github.trim() !== '') {
        githubBtn =
          '<a href="' + project.github + '" target="_blank" ' +
          'class="detail-link-btn detail-github">' +
          '<svg viewBox="0 0 24 24" width="18" height="18" ' +
          'fill="currentColor">' +
          '<path d="M12 0C5.37 0 0 5.37 0 12c0 5.31 3.435 ' +
          '9.795 8.205 11.385.6.105.825-.255.825-.57 0-.285' +
          '-.015-1.23-.015-2.235-3.015.555-3.795-.735-4.035' +
          '-1.41-.135-.345-.72-1.41-1.23-1.695-.42-.225-1.02' +
          '-.78-.015-.795.945-.015 1.62.87 1.845 1.23.72 ' +
          '1.215 1.875.87 2.325.66.075-.51.285-.87.51-1.065' +
          '-2.46-.275-5.025-1.23-5.025-5.46 0-1.2.435-2.19 ' +
          '1.14-2.955-.12-.285-.495-1.41.105-2.91 0 0 .93-.3' +
          ' 3.045 1.14A10.5 10.5 0 0 1 12 5.805c.93 0 1.875' +
          '.12 2.745.36 2.115-1.44 3.045-1.14 3.045-1.14.6 ' +
          '1.5.225 2.625.105 2.91.705.765 1.14 1.755 1.14 ' +
          '2.955 0 4.245-2.58 5.175-5.04 5.46.405.345.75 ' +
          '1.02.75 2.07 0 1.5-.015 2.7-.015 3.075 0 .315.225' +
          '.69.825.57A12.02 12.02 0 0 0 24 12c0-6.63-5.37' +
          '-12-12-12z"/></svg>' +
          '🔗 View Code on GitHub' +
          '</a>';
      }

      // LinkedIn button
      var linkedinBtn = '';
      if (project.linkedin && project.linkedin.trim() !== '') {
        linkedinBtn =
          '<a href="' + project.linkedin + '" target="_blank" ' +
          'class="detail-link-btn detail-linkedin">' +
          '<svg viewBox="0 0 24 24" width="18" height="18" ' +
          'fill="currentColor">' +
          '<path d="M20.447 20.452h-3.554v-5.569c0-1.328-.027' +
          '-3.037-1.852-3.037-1.853 0-2.136 1.445-2.136 2.939' +
          'v5.667H9.351V9h3.414v1.561h.046c.477-.9 1.637-1.85 ' +
          '3.37-1.85 3.601 0 4.267 2.37 4.267 5.455v6.286z' +
          'M5.337 7.433a2.062 2.062 0 0 1-2.063-2.065 2.064 ' +
          '2.064 0 1 1 2.063 2.065zm1.782 13.019H3.555V9h3.564' +
          'v11.452zM22.225 0H1.771C.792 0 0 .774 0 1.729v20.542' +
          'C0 23.227.792 24 1.771 24h20.451C23.2 24 24 23.227 ' +
          '24 22.271V1.729C24 .774 23.2 0 22.222 0h.003z"/>' +
          '</svg>' +
          '👤 Connect on LinkedIn' +
          '</a>';
      }

      var linksSection = '';
      if (githubBtn || linkedinBtn) {
        linksSection =
          '<div class="detail-section">' +
          '<h3>🔗 Links</h3>' +
          '<div class="detail-links">' +
          githubBtn + linkedinBtn +
          '</div></div>';
      }

      // Owner actions
      var ownerActions = '';
      if (isOwner) {
        ownerActions =
          '<div class="owner-actions">' +
          '<h3>Owner Actions</h3>' +
          '<div class="action-buttons">' +
          '<button class="btn-edit" onclick="' +
          'window.location.href=\'edit-project.html?id=' +
          project._id + '\'">' +
          '✏️ Edit Project</button>' +
          '<button class="btn-delete" onclick="deleteProject(\'' +
          project._id + '\')">' +
          '🗑️ Delete Project</button>' +
          '</div></div>';
      }

      document.getElementById('projectDetail').innerHTML =
        // Batch badge
        '<div class="detail-batch-badge">' +
        '📅 Batch ' + (project.batch || 'N/A') +
        '</div>' +

        // Title + meta
        '<div class="detail-header">' +
        '<h1>' + project.title + '</h1>' +
        '<div class="detail-meta">' +
        '<span>👤 ' + (project.ownerName || 'Unknown') + '</span>' +
        '<span>📅 ' +
        new Date(project.createdAt).toLocaleDateString() +
        '</span>' +
        '</div>' +
        '</div>' +

        // Description
        '<div class="detail-section">' +
        '<h3>📝 Description</h3>' +
        '<p>' + project.description + '</p>' +
        '</div>' +

        // Tech Stack
        '<div class="detail-section">' +
        '<h3>🛠️ Tech Stack</h3>' +
        '<div class="tech-tags">' + techTags + '</div>' +
        '</div>' +

        // Links
        linksSection +

        // Owner actions
        ownerActions;
    }

    function deleteProject(id) {
      if (!confirm(
        'Are you sure you want to delete this project?')) return;

      fetch('http://localhost:5000/api/projects/' + id, {
        method: 'DELETE',
        headers: { 'Authorization': 'Bearer ' + token }
      })
        .then(function(res) { return res.json(); })
        .then(function(data) {
          alert('✅ ' + data.message);
          window.location.href = 'index.html';
        })
        .catch(function() {
          alert('Error deleting project.');
        });
    }

    loadProject();
  </script>

</body>
</html>
