<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Submit Research | EduAchieve</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>

  <header class="site-topbar" style="background: #0B0F19; border-bottom: 1px solid rgba(255,255,255,0.05); height: 64px; display: flex; align-items: center; padding: 0 40px; justify-content: space-between;">
  <div style="display: flex; align-items: center; gap: 12px; width: 300px;">
    <div class="brand-mark" style="background: #E8500A; width: 28px; height: 28px; display: flex; align-items: center; justify-content: center; border-radius: 6px; color: white; font-size: 0.8rem;">🎓</div>
    <div class="brand-title" style="color: white; font-weight: 800; font-size: 1.2rem; font-family: 'Outfit', sans-serif;">EduAchieve</div>
  </div>
  <nav class="top-nav" style="display: flex; gap: 32px; justify-content: center; flex: 1;">
    <a href="index.html" style="color: rgba(255,255,255,0.7); text-decoration: none; font-size: 0.95rem; font-family: 'Inter', sans-serif; font-weight: 500; transition: color 0.2s;" onmouseover="this.style.color='#FFF'" onmouseout="this.style.color='rgba(255,255,255,0.7)'">Home</a>
    <a href="explore.html" style="color: rgba(255,255,255,0.7); text-decoration: none; font-size: 0.95rem; font-family: 'Inter', sans-serif; font-weight: 500; transition: color 0.2s;" onmouseover="this.style.color='#FFF'" onmouseout="this.style.color='rgba(255,255,255,0.7)'">Projects</a>
    <a href="submit.html" style="color: rgba(255,255,255,0.7); text-decoration: none; font-size: 0.95rem; font-family: 'Inter', sans-serif; font-weight: 500; transition: color 0.2s;" onmouseover="this.style.color='#FFF'" onmouseout="this.style.color='rgba(255,255,255,0.7)'">Submit</a>
    <a href="about.html" style="color: rgba(255,255,255,0.7); text-decoration: none; font-size: 0.95rem; font-family: 'Inter', sans-serif; font-weight: 500; transition: color 0.2s;" onmouseover="this.style.color='#FFF'" onmouseout="this.style.color='rgba(255,255,255,0.7)'">About</a>
  </nav>
  <div class="nav-actions" style="display: flex; align-items: center; gap: 16px; width: 300px; justify-content: flex-end;">
    <a href="login.html" class="btn-primary" id="navLogin" style="background: #E8500A; color: white; padding: 8px 20px; border-radius: 6px; text-decoration: none; font-size: 0.85rem; font-weight: 600; font-family: 'Inter', sans-serif;">Login</a>
    <span class="nav-username" id="navUser" style="color: white; font-size: 0.85rem; font-family: 'Inter', sans-serif;"></span>
    <button id="navLogout" style="display: none; background: none; border: none; color: #F87171; cursor: pointer; font-size: 0.85rem; font-weight: 600; font-family: 'Inter', sans-serif;" onclick="logout()">Logout</button>
  </div>
</header>

  <section class="hero-banner" style="min-height: 250px;">
    <h1>Publish Your Research</h1>
    <p>Upload your academic projects and join the institutional repository of PCCOE excellence.</p>
  </section>

  <div class="container section">
    <div class="card" style="max-width: 800px; margin: 0 auto; padding: 40px;">
      <form id="submitProjectForm">
        <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 24px; margin-bottom: 24px;">
          <div class="form-group">
            <label>Project Title</label>
            <input type="text" id="title" placeholder="e.g. Smart Traffic Management" required>
          </div>
          <div class="form-group">
            <label>Domain</label>
            <select id="domain" required>
              <option value="">Select Domain</option>
              <option value="AI/ML">AI/ML</option>
              <option value="Web Development">Web Development</option>
              <option value="IoT">IoT</option>
              <option value="Cybersecurity">Cybersecurity</option>
              <option value="Data Science">Data Science</option>
              <option value="Other">Other</option>
            </select>
          </div>
        </div>

        <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 24px; margin-bottom: 24px;">
          <div class="form-group">
            <label>Batch</label>
            <input type="text" id="batch" placeholder="e.g. 2025-26" required>
          </div>
          <div class="form-group">
            <label>Current Year</label>
            <select id="year" required>
              <option value="">Select Year</option>
              <option value="1st Year">1st Year</option>
              <option value="2nd Year">2nd Year</option>
              <option value="3rd Year">3rd Year</option>
              <option value="4th Year">4th Year</option>
            </select>
          </div>
        </div>

        <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 24px; margin-bottom: 24px;">
          <div class="form-group">
            <label>Researchers (Comma separated)</label>
            <input type="text" id="teamMembers" placeholder="e.g. John Doe, Jane Smith" required>
          </div>
          <div class="form-group">
            <label>Guide Name (Optional)</label>
            <input type="text" id="guideName" placeholder="e.g. Prof. Smith">
          </div>
        </div>

        <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 24px; margin-bottom: 24px;">
          <div class="form-group">
            <label>GitHub Link (Optional)</label>
            <input type="url" id="githubLink" placeholder="https://github.com/...">
          </div>
          <div class="form-group">
            <label>LinkedIn Link (Optional)</label>
            <input type="url" id="linkedinLink" placeholder="https://linkedin.com/in/...">
          </div>
        </div>

        <div class="form-group">
          <label>Research Abstract / Description</label>
          <textarea id="description" rows="6" placeholder="Provide a brief summary of your work..." required></textarea>
          <div id="charCounter" style="text-align: right; font-size: 0.8rem; color: #6B7280; margin-top: 4px;">0 characters</div>
        </div>

        <div class="form-group">
          <label>Project Files (PDF)</label>
          <input type="file" id="fileUpload" accept=".pdf" required>
          <p style="font-size: 0.8rem; color: #6B7280; margin-top: 4px;">Upload your research paper (Max 50MB).</p>
        </div>

        <button type="submit" class="btn-primary" style="width: 100%; padding: 14px; margin-top: 20px;">Publish Project</button>
      </form>
    </div>
  </div>

  <footer class="site-footer">
    <div class="footer-grid">
      <div style="text-align: left;">
        <p style="font-weight: 700; color: #fff; margin-bottom: 10px;">EduAchieve</p>
        <p>Institutional Knowledge Portal</p>
      </div>
      <div class="footer-links">
        <a href="index.html">Home</a>
        <a href="explore.html">Projects</a>
        <a href="about.html">About</a>
      </div>
      <div style="text-align: right;">
        <p>© 2024-26 PCCOE Pune</p>
      </div>
    </div>
  </footer>

  <script src="common.js"></script>
  <script>
    document.addEventListener('DOMContentLoaded', () => {
      const user = checkAuth();
      if (!user) {
        alert('Please login to submit a project.');
        window.location.href = 'login.html';
        return;
      }
      
      // Pre-fill the researchers field with the uploader's name by default
      // They can overwrite it if they are submitting for someone else.
      if (document.getElementById('teamMembers')) {
        document.getElementById('teamMembers').value = user.name || '';
      }

      const form = document.getElementById('submitProjectForm');
      const desc = document.getElementById('description');
      const counter = document.getElementById('charCounter');

      desc.addEventListener('input', () => {
        counter.textContent = desc.value.length + ' characters';
      });

      form.addEventListener('submit', async (e) => {
        e.preventDefault();
        
        const fileInput = document.getElementById('fileUpload');
        if (!fileInput.files[0]) {
          alert('Please select a research paper file to upload.');
          return;
        }

        const formData = new FormData();
        formData.append('title', document.getElementById('title').value);
        formData.append('domain', document.getElementById('domain').value);
        formData.append('batch', document.getElementById('batch').value);
        formData.append('year', document.getElementById('year').value);
        formData.append('description', desc.value);
        formData.append('researchPaper', fileInput.files[0]);

        // Optional fields
        const teamMembers = document.getElementById('teamMembers')?.value.trim();
        if (teamMembers) formData.append('teamMembers', teamMembers);

        const guideName = document.getElementById('guideName')?.value.trim();
        if (guideName) formData.append('guideName', guideName);

        const githubLink = document.getElementById('githubLink')?.value.trim();
        if (githubLink) formData.append('githubLink', githubLink);

        const linkedinLink = document.getElementById('linkedinLink')?.value.trim();
        if (linkedinLink) formData.append('linkedinLink', linkedinLink);

        try {
          const res = await apiCall('/api/projects', {
            method: 'POST',
            body: formData,
            isFormData: true
          });
          alert('Project submitted successfully!');
          window.location.href = 'explore.html';
        } catch (err) {
          alert('Error: ' + err.message);
        }
      });
    });
  </script>
</body>
</html>
