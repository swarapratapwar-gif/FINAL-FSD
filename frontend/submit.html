<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Submit - EduAchieve</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <header class="navbar">
    <div class="brand">EduAchieve</div>
    <nav class="nav-links">
      <a href="index.html">Home</a>
      <a href="explore.html">Explore</a>
      <a href="submit.html" class="active-link">Submit</a>
      <a href="my-profile.html">My Profile</a>
      <a id="navAuth" href="login.html">Login</a>
      <button id="navLogout" class="primary">Logout</button>
      <span id="navUser" class="muted"></span>
    </nav>
  </header>

  <main class="container narrow-wide">
    <section class="card">
      <h2>Submit Project</h2>
      <form id="submitForm" enctype="multipart/form-data">
        <input id="title" placeholder="Project title" required>
        <textarea id="description" placeholder="Project description" required></textarea>
        <div class="form-row">
          <input id="techStack" placeholder="Tech stack" required>
          <input id="batch" placeholder="Batch year" required>
        </div>
        <input id="github" placeholder="GitHub URL (optional)">
        <input id="linkedin" placeholder="LinkedIn URL (optional)">
        
        <div class="file-section">
          <label for="researchPaper" class="file-label">
            Research Paper (PDF) <span class="required">*</span>
          </label>
          <input id="researchPaper" type="file" accept=".pdf,application/pdf" required>
          <small class="muted">Required: PDF file for research paper</small>
        </div>

        <div class="file-section">
          <label for="presentation" class="file-label">
            Presentation (PDF) <span class="optional">(Optional)</span>
          </label>
          <input id="presentation" type="file" accept=".pdf,application/pdf">
          <small class="muted">Optional: PDF file for presentation</small>
        </div>

        <button class="submit" type="submit">Submit Project</button>
      </form>
      <p id="status" class="status muted"></p>
    </section>
  </main>

  <script src="common.js"></script>
  <script src="submit-page.js"></script>
</body>
</html>
